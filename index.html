<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>新北市預售屋實價登錄查詢系統</title>
<style>
body{margin:0;font-family:'Microsoft JhengHei',sans-serif;background:#f4f7fb;color:#222}
.hero{background:#1a3a5c;color:#fff;padding:2rem 2rem 1.5rem;text-align:center}
.hero h1{margin:0 0 .4rem;font-size:1.6rem}
.hero p{margin:0;opacity:.75;font-size:.95rem}
.nav{display:flex;justify-content:center;gap:10px;padding:1rem;flex-wrap:wrap;background:#fff;border-bottom:1px solid #dde3ee}
.nav a{background:#1a3a5c;color:#fff;text-decoration:none;padding:.5rem 1.3rem;border-radius:8px;font-weight:600;font-size:.9rem;transition:.15s}
.nav a:hover{background:#e8732a}
.nav a.active{background:#e8732a}
iframe{width:100%;border:none;display:block;min-height:800px}
</style>
</head>
<body>
<div class="hero">
  <h1>🏠 新北市預售屋實價登錄查詢系統</h1>
  <p>資料來源：內政部不動產實價登錄，共 44,979 筆預售屋交易資料</p>
</div>
<div class="nav">
  <a href="#" onclick="show('search');return false" id="btn-search" class="active">🔍 搜尋篩選</a>
  <a href="#" onclick="show('charts');return false" id="btn-charts">📊 統計分析</a>
  <a href="#" onclick="show('calc');return false" id="btn-calc">🧮 價格計算</a>
  <a href="#" onclick="show('nearby');return false" id="btn-nearby">📍 周邊機能</a>
</div>
<iframe id="f-search" src="widget-1-search.html"></iframe>
<iframe id="f-charts" src="widget-2-charts.html" style="display:none"></iframe>
<iframe id="f-calc" src="widget-3-calculator.html" style="display:none"></iframe>
<iframe id="f-nearby" src="widget-4-nearby.html" style="display:none;min-height:900px"></iframe>
<script>
function show(tab){
  ['search','charts','calc','nearby'].forEach(t=>{
    document.getElementById('f-'+t).style.display = t===tab?'block':'none';
    document.getElementById('btn-'+t).classList.toggle('active', t===tab);
  });
}
// Auto-resize iframes
document.querySelectorAll('iframe').forEach(f=>{
  f.onload=()=>{
    try{f.style.height=f.contentWindow.document.body.scrollHeight+'px';}catch(e){}
  };
});
</script>
</body>
</html>
